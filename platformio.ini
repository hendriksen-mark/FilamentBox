; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = lolin_s3

[common]
; Device configuration
device_name = FilamentBox
; Reduce CPU frequency to save power (240MHz -> 160MHz)
; Change to 80 for even more power savings if performance is adequate
board_build.f_cpu = 160000000L
build_unflags = -std=gnu++11
build_flags =
	-Os
	-DCORE_DEBUG_LEVEL=0
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	; Change to LVL_ERROR for production (saves 3-5KB flash)
	; Change to LVL_TRACE for debugging
	-DDEBUGLOG_DEFAULT_LOG_LEVEL_TRACE
	-DDEBUGLOG_ENABLE_FILE_LOGGER
	-DDEBUGLOG_DEFAULT_FILE_LEVEL_ERROR
	-DDEVICE_NAME=\"${common.device_name}\"
	; -DUSE_SD
	-DUSE_LITTLEFS
lib_deps =
    SPI
    SD
    hideakitai/DebugLog@^0.8.4
    robtillaart/HX711@^0.6.4
    adafruit/DHT sensor library@^1.4.7
    paulstoffregen/TimerOne@^1.2
    schallbert/ClickEncoder@^1.1.0
    adafruit/Adafruit GFX Library@^1.12.6
    adafruit/Adafruit SSD1306@^2.5.17
	hideakitai/DebugLog@^0.8.4
	makuna/NeoPixelBus @ ^2.8.4
	bblanchon/ArduinoJson @ ^7.2.1
upload_protocol = espota
upload_port = ${common.device_name}.local
monitor_speed = 115200

[env:lolin_s3]
; https://github.com/espressif/arduino-esp32/blob/master/variants/lolin_s3/pins_arduino.h
platform = espressif32@6.12.0
board = lolin_s3
framework = arduino
board_build.f_cpu = ${common.board_build.f_cpu}
build_unflags = ${common.build_unflags}
build_flags =
	${common.build_flags}
	-DARDUINO_USB_MODE=1
  	-DARDUINO_USB_CDC_ON_BOOT=1
	-std=gnu++2a
	; Define board specific configurations
	-DINFO_DATA_PIN=LED_BUILTIN-SOC_GPIO_PIN_COUNT ; On Lolin S3, built-in RGB LED is on GPIO38
	-DINFO_LED_ORDER=Rgb
	-DSD_CS_PIN=15
lib_deps =
    ${common.lib_deps}
	tzapu/WiFiManager@^2.0.17
upload_protocol = ${common.upload_protocol}
upload_port = ${common.upload_port}
monitor_speed = ${common.monitor_speed}
